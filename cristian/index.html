<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetMatch</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="header-inner">
    <h1>🐾 PetMatch</h1>
    <p class="header-sub">Encontre seu companheiro ideal</p>
  </div>
</header>

<!-- BOTÃO PARA ABRIR MENU -->
<button class="menu-toggle" id="menuToggle">☰</button>

<!-- MENU LATERAL -->
<nav class="sidebar" id="sidebar">
  <ul class="sidebar-menu">
    <li><a href="#" class="active">🏠 Início</a></li>
    <li><a href="#">🔍 Buscar Pets</a></li>
    <li><a href="#">⭐ Meus Favoritos</a></li>
    <li><a href="#">👤 Meu Perfil</a></li>
  </ul>
</nav>

<!-- FILTROS -->
<section class="filtros">
  <div class="filtros-inner">
    <div class="filtros-selects">

      <div class="select-wrap">
        <label for="tipoFiltro">Tipo</label>
        <select id="tipoFiltro" aria-label="Filtrar por tipo de animal">
          <option value="todos">Todos</option>
          <option value="cao">Cães</option>
          <option value="gato">Gatos</option>
          <option value="silvestre">Silvestre</option>
        </select>
      </div>

      <div class="select-wrap">
        <label for="tamanhoFiltro">Tamanho</label>
        <select id="tamanhoFiltro" aria-label="Filtrar por tamanho">
          <option value="todos">Todos</option>
          <option value="pequeno">Pequeno</option>
          <option value="medio">Médio</option>
          <option value="grande">Grande</option>
        </select>
      </div>

      <div class="select-wrap">
        <label for="ambienteFiltro">Ambiente</label>
        <select id="ambienteFiltro" aria-label="Filtrar por ambiente">
          <option value="todos">Todos</option>
          <option value="apartamento">Apartamento</option>
          <option value="casa">Casa</option>
        </select>
      </div>

      <div class="select-wrap">
        <label for="comportamentoFiltro">Comportamento</label>
        <select id="comportamentoFiltro" aria-label="Filtrar por comportamento">
          <option value="todos">Todos</option>
          <option value="calmo">Calmo</option>
          <option value="ativo">Ativo</option>
        </select>
      </div>

    </div>
    <button id="btnLimpar" class="btn-limpar">✕ Limpar filtros</button>
  </div>
</section>

<!-- CONTADOR -->
<div class="resultados-info" id="resultadosInfo"></div>

<!-- GALERIA -->
<section class="galeria" id="galeria"></section>

<!-- MODAL DE DETALHES -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalNome">
  <div class="modal">
    <button class="modal-fechar" id="modalFechar" aria-label="Fechar">✕</button>
    <img id="modalImg" src="" alt="">
    <div class="modal-body">
      <div class="modal-match-badge" id="modalMatch"></div>
      <h2 id="modalNome"></h2>
      <p id="modalCaracteristicas" class="modal-carac"></p>
      <div class="modal-tags" id="modalTags"></div>
      <button class="btn-adotar" id="modalAdotar">💚 Quero adotar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
