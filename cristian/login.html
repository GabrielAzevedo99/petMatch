<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - PetMatch</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

/* RESET */

* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Nunito', sans-serif;
}

/* CORES DO PROJETO */

:root {
--verde: #2d8a60;
--laranja: #e8723a;
--cinza-bg: #f7f6f2;
--borda: #e4e0d8;
--texto: #2a2a2a;
--sombra: 0 2px 12px rgba(0,0,0,0.08);
}

/* BODY CENTRALIZADO */

body {

background: var(--cinza-bg);

display: flex;
flex-direction: column;

min-height: 100vh;

}

/* HEADER */

header {

width: 100%;

height: 100px;

background: var(--verde);

display: flex;
align-items: center;
justify-content: center;

text-align: center;

}

.header-inner h1 {

font-size: 2rem;
font-weight: 800;

color: white;

}

.header-sub {

font-size: 0.9rem;

color: rgba(255,255,255,0.85);

}

/* ÁREA CENTRAL */

main {

flex: 1;

display: flex;

align-items: center;
justify-content: center;

padding: 20px;

}

/* CARD LOGIN */

.auth-card {

width: 100%;
max-width: 380px;

background: white;

padding: 32px;

border-radius: 18px;

box-shadow: var(--sombra);

border: 1px solid var(--borda);

text-align: center;

}

/* TÍTULO */

.auth-card h2 {

color: var(--verde);

margin-bottom: 20px;

font-weight: 800;

}

/* INPUTS */

.input-group {

margin-bottom: 14px;

}

.input-group input {

width: 100%;

padding: 13px;

border-radius: 10px;

border: 1.5px solid var(--borda);

background: var(--cinza-bg);

font-size: 14px;

transition: 0.2s;

}

.input-group input:focus {

outline: none;

border-color: var(--verde);

box-shadow: 0 0 0 3px rgba(45,138,96,0.15);

}

/* BOTÃO */

.btn-auth {

width: 100%;

padding: 13px;

border: none;

border-radius: 10px;

background: var(--verde);

color: white;

font-weight: 700;

font-size: 15px;

cursor: pointer;

transition: 0.2s;

}

.btn-auth:hover {

opacity: 0.9;

transform: scale(0.98);

}

/* LINKS */

.auth-links {

margin-top: 16px;

display: flex;
flex-direction: column;

gap: 8px;

font-size: 14px;

}

.auth-links a {

color: var(--laranja);

font-weight: 600;

text-decoration: none;

}

.auth-links a:hover {

text-decoration: underline;

}

/* MENSAGEM */

.msg {

margin-top: 12px;

font-weight: 700;

font-size: 14px;

color: var(--laranja);

}

/* RESPONSIVO */

@media (max-width: 420px) {

.auth-card {

padding: 24px;

}

}

</style>

</head>



<body>

<!-- HEADER -->

<header>

<div class="header-inner">

<h1>🐾 PetMatch</h1>

<p class="header-sub">

Encontre seu companheiro ideal

</p>

</div>

</header>



<!-- ÁREA CENTRAL -->

<main>

<div class="auth-card">

<h2>Entrar na sua conta</h2>

<form id="loginForm">

<!-- LOGIN -->

<div class="input-group">

<input
type="text"
id="loginEmail"
placeholder="Login ou Email"
required>

</div>



<!-- SENHA -->

<div class="input-group">

<input
type="password"
id="loginSenha"
placeholder="Senha"
required>

</div>



<!-- BOTÃO -->

<button
type="submit"
class="btn-auth">

Entrar

</button>



<!-- LINKS -->

<div class="auth-links">

<a href="recuperar.html">

Esqueci a senha

</a>

<p>

Não possui conta?

<a href="cadastro.html">

Criar conta

</a>

</p>

<a href="index.html">

← Voltar ao início

</a>

</div>

</form>



<!-- MENSAGEM -->

<div id="msgLogin" class="msg"></div>

</div>

</main>



<!-- SCRIPT -->

<script src="auth.js"></script>

</body>

</html>
